services:
  api:
    build:
      context: <CONTEXT_VALUE>
      dockerfile: Dockerfile.dev
      target: "dev"
    command: sh -c "{{PM}} install && {{PM}} psy db:migrate --skip-sync && {{PM}} psy db:seed && {{PM}} web:dev"
    environment:
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"
      NPM_CONFIG_STRICT_SSL: "false"
      DB_HOST: db
      WS_REDIS_HOST: redis
      BG_JOBS_REDIS_HOST: redis
      NODE_ENV: "${NODE_ENV:-development}"
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "7777:7777"
    working_dir: /usr/src/app
    volumes:
      - <CONTEXT_VALUE>:/usr/src/app:cached
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7777 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
<API_DEPENDS_ON_YAML>

<WS_YAML>
<WORKER_YAML>
<CLIENT_YAML>
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: howyadoin_development
    user: postgres
    ports:
      - "7433:5432"
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

<REDIS_YAML>
<VOLUMES_YAML>

<NETWORKS_YAML>